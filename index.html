<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Circuito F1 Top-Down</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div id="menu-overlay">
    <div class="title">Circuito F1</div>
    <div class="panel">
      <div class="panel-row">
        <div class="track-label">Circuito</div>
        <select id="track-select">
          <option value="f1">Circuito F1 Top-Down</option>
        </select>
      </div>
      <div class="panel-row">
        <div class="track-label">Vista</div>
        <select id="view-select">
          <option value="top">Top</option>
          <option value="chase">Chase</option>
          <option value="aerial">Aérea</option>
        </select>
      </div>
      <div class="panel-row">
        <div class="player-label">Piloto</div>
        <select id="player-select">
          <option value="red">Equipo Rojo</option>
          <option value="yellow">Equipo Amarillo</option>
          <option value="purple">Equipo Morado</option>
        </select>
      </div>
      <button id="start-button">¡Empezar Gran Premio!</button>
    </div>
  </div>
  <div id="game-overlay" style="display: none;">
    <div class="title">Circuito F1</div>
    <div class="panel">
      <div class="hud">
        <div>Velocidad: <span id="speed">0</span> km/h</div>
        <div>Vueltas: <span id="lap">0</span> / 3</div>
        <div>Track: <span id="track-name">Circuito F1 Top-Down</span></div>
        <div id="message">Usa W/A/S/D para conducir.</div>
      </div>
      <div class="instructions">
        Controles: <strong>W</strong>=Acelerar, <strong>S</strong>=Frenar, <strong>A/D</strong>=Girar
      </div>
    </div>
  </div>
  <script src="https://cdn.jsdelivr.net/npm/three@0.158.0/build/three.min.js"></script>
  <script src="main.js"></script>
</body>
</html>
